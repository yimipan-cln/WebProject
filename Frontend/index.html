<!DOCTYPE html>

<html lang="es">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Portafolio Escolar</title>

<style>

body{
    font-family: Arial, sans-serif;
    background:#f5f7fa;
    margin:0;
    padding:40px;
}

.container{
    max-width:900px;
    margin:auto;
}

h1{
    text-align:center;
    color:#1e293b;
    margin-bottom:40px;
}

.card-alumno{
    background:white;
    padding:25px;
    border-radius:12px;
    box-shadow:0 3px 10px rgba(0,0,0,.1);
    margin-bottom:30px;
}

#lista{
    list-style:none;
    padding:0;
}

#lista li{
    background:white;
    padding:18px;
    margin-bottom:15px;
    border-radius:12px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    box-shadow:0 3px 10px rgba(0,0,0,.1);
}

.folio{
    font-weight:bold;
    color:#2563eb;
    margin-right:10px;
}

.titulo{
    font-size:18px;
}

.perfil{
    width:150px;
    height:150px;
    object-fit:cover;
    border-radius:50%;
    display:block;
    margin:20px auto;
    box-shadow:0 3px 10px rgba(0,0,0,.2);
}

.btn{
    background:#2563eb;
    color:white;
    padding:10px 18px;
    border-radius:8px;
    text-decoration:none;
    transition:.3s;
}

.btn:hover{
    background:#1d4ed8;
}

</style>

</head>

<body>

<div class="container">
<h1>Portafolio Escolar</h1>
<p>Programación Web</p>

<div class="card-alumno">

<img src="images/UdeO_logo.png"
         alt="UAdeO Logo"
         class="perfil">

<h3>Nombre</h3>

<p>Jorge Abdiel Kataura Quintana</p>

<h3>Matrícula</h3>

<p>24041170</p>

<h3>Grupo</h3>

<p>03 ISOF</p>
</div>

<h2>Tareas del semestre</h2>

<ul id="lista"></ul>
</div>

<script src="script.js"></script>

<hr>

<p style="text-align:center;">
    Universidad Autónoma de Occidente<br>
    Programación Web - Portafolio Escolar
</p>

</body>

</html>
